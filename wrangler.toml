# Cloudflare Workers configuration
name = "promo-code-manager"
main = "dist/worker.js"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]

# Custom domain (keeps blueempiregroup.co.uk attached to this Worker on deploy)
routes = [
  { pattern = "blueempiregroup.co.uk", custom_domain = true }
]

# Keep the free *.workers.dev URL and preview URLs on (defining routes would otherwise turn these off)
workers_dev = true
preview_urls = true

# Static assets (React build files). single-page-application makes Cloudflare
# serve index.html (200) for app routes like /campaigns, so refreshing or
# opening a deep link never breaks.
[assets]
directory = "./dist/public"
# binding is REQUIRED for the worker code to call env.ASSETS.fetch() — without
# it env.ASSETS is undefined and every deep link (e.g. /campaigns) crashes.
binding = "ASSETS"
not_found_handling = "single-page-application"

# Note: Secrets should be set using: wrangler secret put <KEY_NAME>
# Run these commands after first deployment:
# wrangler secret put DATABASE_URL
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put API_KEY

[env.production]
name = "promo-code-manager-prod"

[env.preview]  
name = "promo-code-manager-preview"