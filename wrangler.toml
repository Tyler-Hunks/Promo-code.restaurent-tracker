# Cloudflare Workers configuration
name = "promo-code-manager"
main = "dist/worker.js"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]

# Custom domain (keeps blueempiregroup.co.uk attached to this Worker on deploy)
routes = [
  { pattern = "blueempiregroup.co.uk", custom_domain = true }
]

# Static assets (React build files)
[assets]
directory = "./dist/public"

# Note: Secrets should be set using: wrangler secret put <KEY_NAME>
# Run these commands after first deployment:
# wrangler secret put DATABASE_URL
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put API_KEY

[env.production]
name = "promo-code-manager-prod"

[env.preview]  
name = "promo-code-manager-preview"