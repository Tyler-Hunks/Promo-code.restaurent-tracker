# Cloudflare Workers configuration
name = "promo-code-manager"
main = "dist/worker.js"
compatibility_date = "2024-08-10"
compatibility_flags = ["nodejs_compat"]

# Static assets (React build files)
[assets]
directory = "dist/public"

# Development environment (default)
[vars]
NODE_ENV = "production"

# Production environment
[env.production]
name = "promo-code-manager-prod"
route = { pattern = "your-domain.com/*", zone_name = "your-domain.com" }
[env.production.vars]
NODE_ENV = "production"

# Preview/Staging environment
[env.preview]  
name = "promo-code-manager-preview"
[env.preview.vars]
NODE_ENV = "production"