<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Apply the saved theme before React mounts to avoid a flash of the wrong theme.
      try {
        var savedTheme = localStorage.getItem('promo-theme');
        if (savedTheme === 'restaurant') {
          document.documentElement.classList.add('theme-restaurant');
        } else if (savedTheme === 'restaurant-dark') {
          document.documentElement.classList.add('theme-restaurant-dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
